# Cấu hình tường minh, KHÔNG dùng cấu hình mặc định (spring.datasource.*)
# Tuân thủ quy tắc Explicit Configuration

server:
  port: 8081 # Mỗi bài thực hành chạy một port khác nhau để tránh đụng

# Cấu hình Tenant A (DB 1)
custom:
  datasource:
    db1:
      url: jdbc:mysql://localhost:3306/tenant_a_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      username: userA
      password: passA
      driver-class-name: com.mysql.cj.jdbc.Driver
      # HikariCP configurations
      pool-name: HikariPool-TenantA
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

# Cấu hình Tenant B (DB 2)
    db2:
      url: jdbc:mysql://localhost:3307/tenant_b_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      username: userB
      password: passB
      driver-class-name: com.mysql.cj.jdbc.Driver
      # HikariCP configurations
      pool-name: HikariPool-TenantB
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
